<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>📭 今日招聘推送暂无数据</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #f5f5f5;
    color: #333;
    padding-bottom: 80px;
}

/* ===== 顶部控制栏 ===== */
.control-bar {
    position: sticky; top:0; z-index:100;
    background: linear-gradient(135deg, #1A73E8 0%, #4FC3F7 100%);
    padding: 12px 16px;
    box-shadow: 0 2px 12px rgba(26,115,232,0.3);
}
.control-row {
    display: flex; align-items: center; justify-content: center; gap: 12px;
}
.control-btn {
    width: 48px; height: 48px;
    border: none; border-radius: 50%;
    background: rgba(255,255,255,0.2);
    color: #fff;
    font-size: 22px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
}
.control-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.35); }
.control-btn.play-btn {
    width: 64px; height: 64px;
    background: #fff;
    color: #1A73E8;
    font-size: 28px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
}
.control-btn.play-btn.playing { color: #FF6B35; }

.speed-select {
    background: rgba(255,255,255,0.2);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 14px;
    cursor: pointer;
    -webkit-appearance: none;
}
.speed-select option { color: #333; }

/* ===== 进度信息 ===== */
.progress-row {
    display: flex; align-items: center; gap: 10px;
    margin-top: 8px;
    color: rgba(255,255,255,0.9);
    font-size: 13px;
}
.progress-bar-outer {
    flex: 1; height: 4px;
    background: rgba(255,255,255,0.3);
    border-radius: 2px;
    overflow: hidden;
}
.progress-bar-inner {
    height: 100%;
    background: #fff;
    border-radius: 2px;
    transition: width 0.3s;
    width: 0%;
}
.progress-text {
    white-space: nowrap;
    min-width: 90px;
    text-align: right;
}

/* ===== 当前朗读提示 ===== */
.now-playing {
    background: #FFF9C4;
    padding: 8px 16px;
    font-size: 13px;
    color: #F57F17;
    text-align: center;
    display: none;
    border-bottom: 2px solid #FFD54F;
}
.now-playing.active { display: block; }

/* ===== 标题区 ===== */
.header {
    background: #fff;
    padding: 20px 16px 12px;
    border-bottom: 1px solid #eee;
}
.header h1 { font-size: 18px; color: #1A73E8; margin-bottom: 4px; }
.header .subtitle { font-size: 13px; color: #888; }

/* ===== 岗位列表 ===== */
.job-item {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 14px 16px;
    background: #fff;
    border-bottom: 1px solid #f0f0f0;
    cursor: pointer;
    transition: background 0.2s;
    -webkit-tap-highlight-color: transparent;
}
.job-item:active { background: #f5f5f5; }
.job-item.reading {
    background: #E3F2FD;
    border-left: 4px solid #1A73E8;
    padding-left: 12px;
}
.job-item.read-done {
    opacity: 0.6;
}

.job-index {
    width: 32px; height: 32px;
    background: #f0f0f0;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: bold;
    color: #888;
    flex-shrink: 0;
}
.job-item.reading .job-index {
    background: #1A73E8;
    color: #fff;
}
.job-item.read-done .job-index {
    background: #4CAF50;
    color: #fff;
}

.job-info { flex:1; min-width:0; }
.job-title {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 4px;
    display: flex; align-items: center; gap: 6px;
    flex-wrap: wrap;
}
.job-detail {
    font-size: 13px;
    color: #666;
    display: flex; flex-wrap: wrap; gap: 8px;
}
.position { color: #1A73E8; }
.salary { color: #FF6B35; font-weight: bold; }
.location { color: #888; }

.tag {
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 10px;
    white-space: nowrap;
}
.tag-new { background: #E8F5E9; color: #2E7D32; }
.tag-repeat { background: #FFF3E0; color: #E65100; }
.tag-update { background: #E3F2FD; color: #1565C0; }

/* ===== 底部浮动条 ===== */
.float-hint {
    position: fixed; bottom: 0; left:0; right:0;
    background: rgba(26,115,232,0.95);
    color: #fff;
    text-align: center;
    padding: 10px 16px;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    gap: 8px;
    z-index: 99;
}
.float-hint .icon { font-size: 20px; }

/* ===== 状态标记 ===== */
.status-badge {
    display: inline-block;
    background: #4CAF50;
    color: #fff;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    animation: pulse 1.5s infinite;
}
@keyframes pulse {
    0%,100% { opacity:1; }
    50% { opacity:0.5; }
}
</style>
</head>
<body>

<!-- 控制栏 -->
<div class="control-bar">
    <div class="control-row">
        <button class="control-btn" onclick="skipPrev()" title="上一条">⏮️</button>
        <button class="control-btn play-btn" id="playBtn" onclick="togglePlay()" title="播放/暂停">
            <span id="playIcon">🎧</span>
        </button>
        <button class="control-btn" onclick="skipNext()" title="下一条">⏭️</button>
        <select class="speed-select" id="speedSelect" onchange="setSpeed(this.value)">
            <option value="0.8">0.8x</option>
            <option value="1.0" selected>1x</option>
            <option value="1.2">1.2x</option>
            <option value="1.5">1.5x</option>
        </select>
    </div>
    <div class="progress-row">
        <span id="progressLabel">0/0</span>
        <div class="progress-bar-outer">
            <div class="progress-bar-inner" id="progressBar"></div>
        </div>
        <span class="progress-text" id="progressText">准备就绪</span>
    </div>
</div>

<!-- 当前朗读提示 -->
<div class="now-playing" id="nowPlaying">
    🔊 正在朗读：<span id="nowPlayingText"></span>
</div>

<!-- 标题 -->
<div class="header">
    <h1>📭 今日招聘推送暂无数据</h1>
    <p class="subtitle">请稍后再试</p>
</div>

<!-- 岗位/新闻列表 -->
<div id="jobList">
<div style="text-align:center;padding:40px;color:#999;">暂无数据</div>
</div>

<!-- 底部提示 -->
<div class="float-hint" id="floatHint">
    <span class="icon">🎧</span>
    <span id="floatText">点击顶部播放按钮开始朗读</span>
</div>

<script>
// ===== 数据 =====
const items = [];
const totalItems = 0;
const speakTemplate = "";

// ===== 状态 =====
let currentIndex = 0;
let isPlaying = false;
let speechRate = 1.0;
let readDoneSet = new Set();
let synth = window.speechSynthesis;
let currentUtterance = null;
let selectedVoice = null;
let voicesReady = false;

// ===== 浏览器检测 =====
function isQQBrowser() {
    let ua = navigator.userAgent || '';
    return /MQQBrowser|QQ\//i.test(ua);
}
function isUCBrowser() {
    let ua = navigator.userAgent || '';
    return /UCBrowser|UCWEB/i.test(ua);
}
function isWeChat() {
    let ua = navigator.userAgent || '';
    return /MicroMessenger/i.test(ua);
}
function isUnsupportedBrowser() {
    return isQQBrowser() || isUCBrowser() || isWeChat();
}

// ===== 初始化 =====
function init() {
    // 浏览器检测：不支持的直接提示换浏览器
    if (isUnsupportedBrowser()) {
        let browserName = isQQBrowser() ? 'QQ浏览器' : (isUCBrowser() ? 'UC浏览器' : '微信内置浏览器');
        showBrowserWarning(browserName);
        return;
    }

    if (!synth) {
        showBrowserWarning('当前浏览器');
        return;
    }

    // Chrome/Edge: voices 通过异步事件加载
    let voices = synth.getVoices();
    if (voices && voices.length > 0) {
        pickVoice(voices);
    }

    // 监听语音列表加载（关键！Android Chrome 需要等事件）
    synth.onvoiceschanged = function() {
        voices = synth.getVoices();
        if (voices && voices.length > 0 && !voicesReady) {
            pickVoice(voices);
            document.getElementById('floatText').textContent =
                '✅ 语音引擎就绪 (' + voices.length + '个) — 点🎧开始朗读';
            document.getElementById('progressText').textContent = '就绪 ✓';
        }
    };

    // 超时兜底：2秒后强制尝试
    setTimeout(function() {
        if (!voicesReady) {
            voices = synth.getVoices();
            if (voices && voices.length > 0) {
                pickVoice(voices);
            }
            if (selectedVoice) {
                document.getElementById('floatText').textContent =
                    '✅ 语音引擎: ' + selectedVoice.name;
                document.getElementById('progressText').textContent = '就绪 ✓';
            } else {
                document.getElementById('floatText').textContent =
                    '⚠️ 未找到中文语音，请用系统自带 Chrome/Edge 打开';
                document.getElementById('progressText').textContent = '无中文语音 ⚠️';
            }
            voicesReady = true;
        }
    }, 2500);
}

function showBrowserWarning(browserName) {
    // 隐藏控制栏播放按钮
    document.getElementById('playBtn').style.opacity = '0.3';
    document.getElementById('playBtn').style.pointerEvents = 'none';
    // 底部显示换浏览器提示
    document.getElementById('floatHint').style.background = 'rgba(211,47,47,0.95)';
    document.getElementById('floatText').innerHTML =
        '❌ ' + browserName + '不支持语音朗读<br><small>👉 请用 <b>Chrome</b> 或 <b>Edge</b> 浏览器打开</small>';
    document.getElementById('progressText').textContent = '❌ 浏览器不支持';
    // 页面顶部插入醒目提示横幅
    let banner = document.createElement('div');
    banner.style.cssText = 'background:#FFEBEE;border-bottom:2px solid #EF5350;padding:16px;text-align:center;';
    banner.innerHTML =
        '<div style="font-size:40px;margin-bottom:8px;">🚫</div>' +
        '<div style="font-size:15px;font-weight:bold;color:#C62828;margin-bottom:6px;">' +
        browserName + ' 不支持语音朗读</div>' +
        '<div style="font-size:14px;color:#555;line-height:1.6;">' +
        '请用 <b style="color:#1A73E8;">Chrome</b> 或 <b style="color:#0078D4;">Edge</b> 浏览器打开即可朗读<br>' +
        '<span style="font-size:12px;color:#999;">（应用商店搜索"Chrome"或"Edge"下载）</span></div>';
    let header = document.querySelector('.header');
    if (header) {
        header.parentNode.insertBefore(banner, header);
    }
    // 禁用所有岗位点击
    document.querySelectorAll('.job-item').forEach(function(el) {
        el.style.pointerEvents = 'none';
        el.style.opacity = '0.5';
    });
}

function pickVoice(voices) {
    // 优先级：zh-CN 中文女声 > zh-CN 任意 > zh-* > 第一个
    let preferred = ['zh-CN', 'zh-Hans', 'zh-HK', 'zh-TW', 'zh'];
    for (let lang of preferred) {
        for (let v of voices) {
            if (v.lang && v.lang.startsWith(lang)) {
                // 优先女声
                if (v.name.toLowerCase().indexOf('female') >= 0 ||
                    v.name.indexOf('女') >= 0) {
                    selectedVoice = v;
                    voicesReady = true;
                    return;
                }
            }
        }
    }
    // 中文任意
    for (let lang of preferred) {
        for (let v of voices) {
            if (v.lang && v.lang.startsWith(lang)) {
                selectedVoice = v;
                voicesReady = true;
                return;
            }
        }
    }
    // 无中文语音 → 用第一个兜底
    if (voices.length > 0) {
        selectedVoice = voices[0];  // 用第一个兜底
    }
    voicesReady = true;
}

// ===== 构建朗读文本 =====
function buildSpeakText(item) {
    let raw = speakTemplate
        .replace('{company}', item.company || '')
        .replace('{position}', item.position || '')
        .replace('{salary}', item.salary || '面议')
        .replace('{location}', item.location || '')
        .replace('{body}', item.body || '');
    return _cleanForTTS(raw);
}

// ===== TTS 文本清洗：去除所有 Markdown 残留符号 =====
function _cleanForTTS(text) {
    if (!text) return text;
    let cleaned = text;
    // 去除 Markdown 标题标记 (# ## ### #### 等)
    cleaned = cleaned.replace(/#{1,6}\s*/g, '');
    // 去除加粗/斜体标记 (** __ * _)
    cleaned = cleaned.replace(/\*{1,2}|_/g, '');
    // 去除管道符 (表格)
    cleaned = cleaned.replace(/\|/g, ' ');
    // 去除反引号 (代码)
    cleaned = cleaned.replace(/`+/g, '');
    // 去除波浪线
    cleaned = cleaned.replace(/~+/g, '');
    // 去除分散的 -  :  标记（但不破坏正常连字符和冒号）
    cleaned = cleaned.replace(/：/g, ':');
    // 压缩多余空格
    cleaned = cleaned.replace(/\s+/g, ' ');
    // 去除连续连字符
    cleaned = cleaned.replace(/-{2,}/g, '');
    return cleaned.trim();
}

// ===== 朗读单条 =====
function speakItem(index) {
    if (index < 0 || index >= totalItems) return;

    currentIndex = index;

    synth.cancel();
    let item = items[index];
    let text = buildSpeakText(item);

    let utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'zh-CN';
    utterance.rate = speechRate;
    utterance.pitch = 1.0;
    utterance.volume = 1.0;
    if (selectedVoice) {
        utterance.voice = selectedVoice;
    }

    utterance.onstart = function() {
        updateUI(index);
        document.getElementById('nowPlaying').classList.add('active');
        document.getElementById('nowPlayingText').textContent =
            (item.company || '') + ' ' + (item.position || '');
    };

    utterance.onend = function() {
        readDoneSet.add(index);
        updateReadDone(index);
        let next = index + 1;
        if (next < totalItems && isPlaying) {
            speakItem(next);
        } else if (next >= totalItems) {
            stopPlayback();
            document.getElementById('floatText').textContent = '✅ 全部朗读完成！';
            document.getElementById('progressText').textContent = '朗读完成';
            document.getElementById('progressBar').style.width = '100%';
            document.getElementById('progressLabel').textContent = totalItems + '/' + totalItems;
        }
    };

    utterance.onerror = function(e) {
        if (e.error !== 'canceled' && e.error !== 'interrupted') {
            let errMsg = '⚠️ 朗读出错: ' + (e.error || 'unknown');
            document.getElementById('progressText').textContent = errMsg;
            document.getElementById('floatText').textContent =
                errMsg + ' — 可尝试用系统自带浏览器打开';
            let next = index + 1;
            if (next < totalItems && isPlaying) {
                setTimeout(function() { speakItem(next); }, 500);
            }
        }
    };

    currentUtterance = utterance;
    synth.speak(utterance);
}

// ===== 播放控制 =====
function togglePlay() {
    if (isPlaying) {
        pausePlayback();
    } else {
        startPlayback();
    }
}

function startPlayback() {
    isPlaying = true;
    document.getElementById('playIcon').textContent = '⏸️';
    document.getElementById('playBtn').classList.add('playing');
    document.getElementById('progressText').textContent = '朗读中...';
    document.getElementById('floatText').textContent =
        selectedVoice
            ? '🔊 朗读中 (' + selectedVoice.name + ') ...'
            : '🔊 朗读中 (系统默认语音)...';
    speakItem(currentIndex);
}

function pausePlayback() {
    isPlaying = false;
    synth.cancel();
    document.getElementById('playIcon').textContent = '🎧';
    document.getElementById('playBtn').classList.remove('playing');
    document.getElementById('nowPlaying').classList.remove('active');
    document.getElementById('floatText').textContent = '⏸️ 已暂停，点击继续';
    document.getElementById('progressText').textContent = '已暂停';
}

function stopPlayback() {
    isPlaying = false;
    synth.cancel();
    document.getElementById('playIcon').textContent = '🎧';
    document.getElementById('playBtn').classList.remove('playing');
    document.getElementById('nowPlaying').classList.remove('active');
    document.getElementById('floatText').textContent = '✅ 朗读完成';
}

function skipNext() {
    synth.cancel();
    let next = (currentIndex + 1) % totalItems;
    currentIndex = next;
    isPlaying = true;
    document.getElementById('playIcon').textContent = '⏸️';
    document.getElementById('playBtn').classList.add('playing');
    speakItem(currentIndex);
}

function skipPrev() {
    synth.cancel();
    let prev = currentIndex - 1;
    if (prev < 0) prev = totalItems - 1;
    currentIndex = prev;
    isPlaying = true;
    document.getElementById('playIcon').textContent = '⏸️';
    document.getElementById('playBtn').classList.add('playing');
    speakItem(currentIndex);
}

function jumpTo(index) {
    synth.cancel();
    currentIndex = index;
    isPlaying = true;
    document.getElementById('playIcon').textContent = '⏸️';
    document.getElementById('playBtn').classList.add('playing');
    speakItem(currentIndex);
}

function setSpeed(val) {
    speechRate = parseFloat(val);
    document.getElementById('floatText').textContent =
        '🎵 朗读速度: ' + val + 'x';
    setTimeout(function() {
        if (isPlaying) {
            document.getElementById('floatText').textContent = '🔊 朗读中...';
        }
    }, 1500);
}

// ===== UI更新 =====
function updateUI(index) {
    // 进度条
    let pct = (index / totalItems) * 100;
    document.getElementById('progressBar').style.width = pct + '%';
    document.getElementById('progressLabel').textContent = (index + 1) + '/' + totalItems;
    document.getElementById('progressText').textContent =
        '正在朗读第 ' + (index + 1) + ' ' + ''.replace('个岗位','').replace('条新闻','');

    // 高亮当前
    document.querySelectorAll('.job-item').forEach(function(el) {
        el.classList.remove('reading');
    });
    let currentEl = document.querySelector('.job-item[data-index="' + index + '"]');
    if (currentEl) {
        currentEl.classList.add('reading');
        currentEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
}

function updateReadDone(index) {
    let el = document.querySelector('.job-item[data-index="' + index + '"]');
    if (el) {
        el.classList.add('read-done');
    }
}

// ===== 启动 =====
init();

// ===== 移动端保持屏幕唤醒（可选） =====
if (navigator.wakeLock) {
    try {
        navigator.wakeLock.request('screen');
    } catch(e) {}
}
</script>
</body>
</html>
